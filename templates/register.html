<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — Telos</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/telos.css') }}">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark" style="width:36px;height:36px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:1.1rem;">T</div>
      <span style="font-size:1.2rem;font-weight:700;color:var(--text);">Telos</span>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}" style="margin-bottom:16px;">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <div class="auth-title">Create account</div>
    <div class="auth-subtitle" style="margin-bottom:24px;">Start tracking your A-level progress</div>

    <form method="POST" style="display:flex; flex-direction:column; gap:14px;">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Your name" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control"
               placeholder="At least 8 characters" required minlength="8">
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%; justify-content:center;">
        Create account
      </button>
    </form>

    <div style="text-align:center; margin-top:18px; font-size:0.82rem; color:var(--muted);">
      Already have an account? <a href="{{ url_for('login') }}" class="auth-link">Log in</a>
    </div>
  </div>
</div>
</body>
</html>
